# Game ports must listen on all host interfaces (0.0.0.0) so Hamachi peers can reach Docker Desktop on Windows.
# Set HAMACHI_IP in a .env file to your LogMeIn IPv4 (same IP your friend uses in the client); updates imageServer at startup.
# Windows: allow TCP 26000–26001 inbound (Private network profile often matches the Hamachi adapter).
services:
  server:
    image: "evemu_server"
    build: . #Build image from source repository
    container_name: server
    volumes:
      - ./config:/app/etc
      - server_cache:/app/server_cache
      # Bind repo image_cache (NPC portraits, player uploads) so seeded JPEGs are available without a separate volume seed step.
      - ./image_cache:/app/image_cache
      # Host migrations overlay the baked image so `git pull` new SQL applies without rebuilding the image first.
      - ./sql/migrations:/src/sql/migrations:ro
    ports:
      - "0.0.0.0:26000:26000/tcp"
      - "0.0.0.0:26001:26001/tcp"
    depends_on:
      - db
    links:
      - "db"
    environment:
      - HAMACHI_IP=${HAMACHI_IP:-25.11.147.190}
      - SEED_MARKET=${SEED_MARKET:-TRUE} # Set to TRUE to seed the market when the server starts for the first time
      - SEED_SATURATION=${SEED_SATURATION:-80} # Set saturation level of seed
      - SEED_REGIONS=${SEED_REGIONS:-Derelik,The Citadel,The Forge,Essence,Domain,Kor-Azor,Metropolis,Sinq Laison} # Define regions to be seeded
      - RUN_WITH_GDB=${RUN_GDB:-FALSE} # TRUE = run eve-server under gdb in the container (dev only)
    stdin_open: true # Enables stdin for the container. Attach to it with 'docker attach'
    tty: true
    # cap_add: #This is required for gdb to work
    #   - SYS_PTRACE

  db:
    image: "mariadb:11.8"
    container_name: db
    volumes:
      - db:/var/lib/mysql
    # Host port for local tools (evedbtool, mysql client). Change if 3306 is in use.
    ports:
      - "3306:3306"
    environment:
      - MARIADB_RANDOM_ROOT_PASSWORD=true
      - MARIADB_USER=evemu
      - MARIADB_PASSWORD=evemu
      - MARIADB_DATABASE=evemu

volumes:
  db:
  server_cache:

